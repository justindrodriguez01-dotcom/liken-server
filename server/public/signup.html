<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon32.png">
  <title>Create account — ColdMatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f4;
      --surface: #ffffff;
      --border: #e5e4e2;
      --border-strong: #d1d0ce;
      --accent: #0D7377;
      --accent-hover: #0A5F63;
      --accent-dim: rgba(13,115,119,0.08);
      --text-primary: #111111;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }


    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
    }
    .logo {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .card h1 {
      font-size: 24px;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 10px 13px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .field input.error { border-color: #ef4444; }

    .btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: -0.01em;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { background: #7ab8ba; cursor: not-allowed; }

    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 10px 13px;
      font-size: 13px;
      color: #b91c1c;
      margin-bottom: 16px;
    }
    .error-msg.visible { display: block; }

    .footer-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .footer-link a {
      color: var(--accent);
      font-weight: 500;
      text-decoration: none;
    }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">ColdMatch</a>
  </nav>

  <div class="page">
    <div class="card">
      <h1>Create your account</h1>
      <p class="card-sub">Free to use.</p>

      <div id="error-msg" class="error-msg"></div>

      <form id="signup-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" />
        </div>
        <div class="field">
          <label for="confirm">Confirm password</label>
          <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn" id="submit-btn">Create account</button>
      </form>

      <p class="footer-link">Already have an account? <a href="/login">Log in</a></p>
    </div>
  </div>

  <script>
    const form      = document.getElementById('signup-form');
    const emailEl   = document.getElementById('email');
    const passEl    = document.getElementById('password');
    const confirmEl = document.getElementById('confirm');
    const submitBtn = document.getElementById('submit-btn');
    const errorMsg  = document.getElementById('error-msg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }
    function clearError() {
      errorMsg.classList.remove('visible');
      [emailEl, passEl, confirmEl].forEach(el => el.classList.remove('error'));
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const email    = emailEl.value.trim();
      const password = passEl.value;
      const confirm  = confirmEl.value;

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        emailEl.classList.add('error');
        return showError('Please enter a valid email address.');
      }
      if (password.length < 8) {
        passEl.classList.add('error');
        return showError('Password must be at least 8 characters.');
      }
      if (password !== confirm) {
        confirmEl.classList.add('error');
        return showError('Passwords do not match.');
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account…';

      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed.');
        localStorage.setItem('cm_token', data.token);
        window.location.href = '/onboarding';
      } catch (err) {
        showError(err.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create account';
      }
    });
  </script>

</body>
</html>
