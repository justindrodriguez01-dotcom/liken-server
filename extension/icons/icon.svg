<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Off-white background, rounded square -->
  <rect width="100" height="100" rx="20" ry="20" fill="#F5F4F1"/>

  <!-- Teal C arc: center (50,50), r=32, from 45° to 315° clockwise (opening right) -->
  <path d="M 72.63 72.63 A 32 32 0 1 0 72.63 27.37"
        stroke="#0D7377" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Crosshair tick marks -->
  <line x1="50" y1="14" x2="50" y2="22" stroke="#0D7377" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="78" x2="50" y2="86" stroke="#0D7377" stroke-width="3" stroke-linecap="round"/>
  <line x1="14" y1="50" x2="22" y2="50" stroke="#0D7377" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="50" x2="86" y2="50" stroke="#0D7377" stroke-width="3" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="3" fill="#0D7377"/>

  <!-- Faded endpoint dots at C openings -->
  <circle cx="72.63" cy="72.63" r="4" fill="#0D7377" opacity="0.3"/>
  <circle cx="72.63" cy="27.37" r="4" fill="#0D7377" opacity="0.3"/>
</svg>
